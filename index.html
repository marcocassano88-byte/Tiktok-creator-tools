<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>TikTok Creator Tools</title>
</head>

<body style="font-family: Arial; max-width: 600px; margin: auto; text-align: center;">

<h1>TikTok Creator Tools</h1>

<h2>Calcolatore guadagni TikTok</h2>

<input type="number" id="views" placeholder="Inserisci visualizzazioni">

<br><br>

<button onclick="calcola()">Calcola guadagno</button>

<h3 id="result"></h3>

<script>
function calcola() {
    let views = document.getElementById("views").value;

    if (!views || views <= 0) {
        document.getElementById("result").innerHTML = "Inserisci un numero valido";
        return;
    }

    let min = views * 0.0002;
    let max = views * 0.0008;

    document.getElementById("result").innerHTML =
        "Guadagno stimato: €" + min.toFixed(2) + " - €" + max.toFixed(2);
}
</script>

</body>
</html>
