<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Calcolatore Guadagni TikTok</title>
</head>

<body style="font-family: Arial; max-width:600px; margin:auto; text-align:center;">

<h1>Calcolatore Guadagni TikTok</h1>

<input type="number" id="views" placeholder="Visualizzazioni">

<br><br>

<button onclick="calcola()">Calcola</button>

<h3 id="result"></h3>

<script>
function calcola() {
    let views = document.getElementById("views").value;

    let min = views * 0.0002;
    let max = views * 0.0008;

    document.getElementById("result").innerHTML =
        "Guadagno stimato: €" + min.toFixed(2) + " - €" + max.toFixed(2);
}
</script>

</body>
</html>
